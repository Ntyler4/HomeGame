<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>League Invite 🃏</title>
    <meta property="og:type" content="website" />
    <meta property="og:title" content="🃏 League Invite — Home Game" />

    <meta name="twitter:card" content="summary" />

  <body style="background:#0A0A0A;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;">
    <div style="text-align:center;color:#C9A84C;">
      <div style="font-size:52px;margin-bottom:12px">🃏</div>

    <script>
      const code = new URLSearchParams(window.location.search).get('join');
      window.location.replace(code ? '/?join=' + encodeURIComponent(code) : '/');
    </script>
